<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영어 교실 칭찬판</title>
  
  <!-- Tailwind CSS (디자인을 위해 필요) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (화면 구성을 위해 필요) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (브라우저에서 React 문법을 즉시 해석하기 위해 필요) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Confetti (파티 폭죽 효과) -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="m-0 p-0">
  <!-- React 앱이 표시될 빈 공간 -->
  <div id="root"></div>

  <!-- React 코드를 HTML 안에 직접 작성 -->
  <script type="text/babel" data-type="module">
    const { useState, useEffect } = React;
    
    // 브라우저에서 직접 Firebase 불러오기
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // 🌟 선생님의 파이어베이스 프로젝트 설정 🌟
    const myFirebaseConfig = {
      apiKey: "AIzaSyDU4veoMxD-A1dIvGTliKTWGsFKvPVDieM",
      authDomain: "english-note-bb12c.firebaseapp.com",
      projectId: "english-note-bb12c",
      storageBucket: "english-note-bb12c.firebasestorage.app",
      messagingSenderId: "988496692846",
      appId: "1:988496692846:web:fb4124eb57524bc735487f",
      measurementId: "G-6M83PV8NBE"
    };

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : myFirebaseConfig;
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 데이터베이스 저장용 고유 이름
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'english-class-board';
    const CLASSES = ['3-1', '4-1', '4-2', '5-1', '5-2', '6-1', '6-2'];

    function App() {
      const [user, setUser] = useState(null);
      const [selectedClass, setSelectedClass] = useState(CLASSES[0]);
      const [classData, setClassData] = useState({ balloons: 0, bigStickers: 0 });
      const [activeTab, setActiveTab] = useState(1);
      const [showCelebration, setShowCelebration] = useState(false);
      const [isAnimating, setIsAnimating] = useState(false);
      
      // ✅ 현재 상태를 화면에 표시하기 위한 상태값 추가
      const [statusMsg, setStatusMsg] = useState('🔄 데이터베이스 연결 중...');

      // 1. Firebase 인증
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("인증 실패:", error);
            setStatusMsg('❌ 인증 에러: 승인된 도메인 및 익명로그인 설정을 확인하세요 (' + error.code + ')');
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
          if (currentUser) setStatusMsg('✅ 연결 성공 (데이터 불러오는 중...)');
        });
        return () => unsubscribe();
      }, []);

      // 2. 선택된 반 데이터 실시간 불러오기
      useEffect(() => {
        if (!user || !selectedClass) return;

        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'classes', selectedClass);
        
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          setStatusMsg('✅ 연결 성공'); // 데이터 로드 성공
          if (docSnap.exists()) {
            const data = docSnap.data();
            setClassData({
              balloons: data.balloons || 0,
              bigStickers: data.bigStickers || 0
            });
            
            const expectedTab = Math.max(1, Math.min(5, Math.floor(((data.bigStickers || 0) - 1) / 20) + 1));
            if ((data.bigStickers || 0) === 0) setActiveTab(1);
            else setActiveTab(expectedTab);

          } else {
            setClassData({ balloons: 0, bigStickers: 0 });
            setActiveTab(1);
          }
        }, (error) => {
          console.error("데이터 불러오기 실패:", error);
          setStatusMsg('❌ DB 권한 에러: Firestore Rules 설정을 확인하세요');
        });

        return () => unsubscribe();
      }, [user, selectedClass]);

      // 3. 파티 효과 함수
      const fireSmallConfetti = () => {
        if (window.confetti) {
          window.confetti({ particleCount: 80, spread: 60, origin: { y: 0.7 } });
        }
      };

      const fireBigConfetti = () => {
        if (!window.confetti) return;
        const duration = 4 * 1000;
        const animationEnd = Date.now() + duration;
        const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

        const interval = setInterval(function() {
          const timeLeft = animationEnd - Date.now();
          if (timeLeft <= 0) return clearInterval(interval);
          const particleCount = 50 * (timeLeft / duration);
          window.confetti(Object.assign({}, defaults, { 
            particleCount, 
            origin: { x: Math.random(), y: Math.random() - 0.2 } 
          }));
        }, 250);
      };

      // 4. 버튼 클릭 이벤트 (점수 올리기)
      const handleAddBalloon = async () => {
        if (!user || isAnimating) {
          if (!user) alert("데이터베이스와 아직 연결되지 않았습니다. 하단의 상태 메시지를 확인해 주세요.");
          return;
        }
        setIsAnimating(true);

        let newBalloons = classData.balloons + 1;
        let newBigStickers = classData.bigStickers;
        let triggeredConfetti = false;

        if (newBalloons >= 10) {
          newBalloons = 0;
          newBigStickers += 1;
          triggeredConfetti = true;
        }

        try {
          const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'classes', selectedClass);
          await setDoc(docRef, { balloons: newBalloons, bigStickers: newBigStickers }, { merge: true });

          if (triggeredConfetti) {
            if (newBigStickers >= 100) {
              setShowCelebration(true);
              fireBigConfetti();
            } else {
              fireSmallConfetti();
            }
          }
        } catch (error) {
          console.error("저장 에러:", error);
          setStatusMsg('❌ 쓰기 에러: Firestore Rules 설정을 확인하세요');
        }

        setTimeout(() => setIsAnimating(false), 300);
      };

      // 5. 선생님 메뉴 이벤트
      const handleTeacherAdjust = async (type, amount) => {
        if (!user) return;
        let newB = classData.balloons;
        let newS = classData.bigStickers;

        if (type === 'balloon') newB = Math.max(0, Math.min(9, newB + amount));
        if (type === 'sticker') newS = Math.max(0, Math.min(100, newS + amount));

        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'classes', selectedClass);
        await setDoc(docRef, { balloons: newB, bigStickers: newS }, { merge: true });
      };

      const stickersInThisTab = Math.max(0, Math.min(20, classData.bigStickers - (activeTab - 1) * 20));

      return (
        <div className="min-h-screen bg-blue-50 relative font-jua overflow-hidden flex flex-col items-center py-8 px-4">
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
            .font-jua { font-family: 'Jua', sans-serif; }
          `}</style>

          {/* 연결 상태 표시 (디버깅용) */}
          <div className="fixed bottom-4 left-4 z-50 bg-white/90 px-4 py-2 rounded-full text-sm font-sans shadow-md border border-gray-200 text-gray-700 pointer-events-none">
            {statusMsg}
          </div>

          <div className="absolute top-2 right-2 opacity-5 hover:opacity-100 transition-opacity bg-white border border-gray-200 p-1 rounded-lg flex gap-1 z-40 shadow-sm">
            <button onClick={() => handleTeacherAdjust('balloon', 1)} className="px-2 py-1 bg-gray-100 text-xs rounded hover:bg-gray-200">+B</button>
            <button onClick={() => handleTeacherAdjust('balloon', -1)} className="px-2 py-1 bg-gray-100 text-xs rounded hover:bg-gray-200">-B</button>
            <button onClick={() => handleTeacherAdjust('sticker', 1)} className="px-2 py-1 bg-gray-100 text-xs rounded hover:bg-gray-200">+S</button>
            <button onClick={() => handleTeacherAdjust('sticker', -1)} className="px-2 py-1 bg-gray-100 text-xs rounded hover:bg-gray-200">-S</button>
            <button onClick={() => { handleTeacherAdjust('balloon', -classData.balloons); handleTeacherAdjust('sticker', -classData.bigStickers); }} className="px-2 py-1 bg-red-100 text-red-600 text-xs rounded hover:bg-red-200">초기화</button>
          </div>

          <div className="text-center mb-10 w-full max-w-5xl flex flex-col md:flex-row items-center justify-between bg-white p-6 rounded-3xl shadow-md border-4 border-yellow-200">
            <h1 className="text-4xl md:text-5xl text-yellow-500 mb-4 md:mb-0 drop-shadow-sm">
              🌟 영어 교실 칭찬판 🌟
            </h1>
            
            <div className="flex items-center gap-4 bg-indigo-50 py-2 px-6 rounded-2xl border-2 border-indigo-100">
              <span className="text-2xl text-indigo-800">선택 반:</span>
              <select 
                value={selectedClass} 
                onChange={(e) => setSelectedClass(e.target.value)}
                className="text-3xl border-0 bg-transparent text-indigo-600 focus:outline-none cursor-pointer font-bold appearance-none text-center"
                style={{ WebkitAppearance: 'none', MozAppearance: 'none' }}
              >
                {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              <span className="text-2xl text-indigo-400">▼</span>
            </div>
          </div>

          <div className="w-full max-w-6xl grid grid-cols-1 md:grid-cols-12 gap-8">
            <div className="md:col-span-4 bg-white rounded-3xl p-8 shadow-lg border-4 border-red-200 flex flex-col items-center">
              <h2 className="text-3xl text-red-500 mb-2">🎈 풍선 모으기</h2>
              <p className="text-gray-500 text-lg mb-8 bg-red-50 px-4 py-1 rounded-full">10개 = 큰 스티커 1개</p>
              
              <div className="grid grid-cols-2 gap-4 mb-8 w-full px-4">
                {Array.from({ length: 10 }).map((_, i) => (
                  <div 
                    key={i} 
                    className={`aspect-square rounded-full flex items-center justify-center text-5xl transition-all duration-300 border-4 shadow-inner
                      ${i < classData.balloons 
                        ? 'bg-red-50 border-red-300 scale-110' 
                        : 'bg-gray-50 border-gray-200'}`}
                  >
                    {i < classData.balloons ? <span className="animate-bounce">🎈</span> : ''}
                  </div>
                ))}
              </div>

              <button
                onClick={handleAddBalloon}
                disabled={isAnimating}
                className="w-full py-5 bg-gradient-to-r from-red-400 to-pink-500 text-white text-3xl rounded-2xl shadow-xl hover:scale-105 active:scale-95 transition-all font-bold tracking-widest disabled:opacity-70 disabled:hover:scale-100"
              >
                칭찬 풍선 달기
              </button>
            </div>

            <div className="md:col-span-8 bg-white rounded-3xl p-8 shadow-lg border-4 border-indigo-200 flex flex-col">
              <div className="flex justify-between items-center mb-2">
                <h2 className="text-3xl text-indigo-600">🎉 폭죽 스티커 모으기</h2>
                <div className="text-2xl text-indigo-800 bg-indigo-50 px-6 py-2 rounded-full font-bold border-2 border-indigo-200">
                  현재: {classData.bigStickers} / 100
                </div>
              </div>
              <p className="text-gray-500 text-lg mb-6">큰 폭죽 스티커 100개를 모으면 우리 반 과자파티 타임!</p>

              <div className="flex gap-2 mb-8 bg-indigo-50 p-2 rounded-2xl overflow-x-auto">
                {[1, 2, 3, 4, 5].map(tab => (
                  <button
                    key={tab}
                    onClick={() => setActiveTab(tab)}
                    className={`flex-1 py-3 text-xl rounded-xl transition-all whitespace-nowrap px-4
                      ${activeTab === tab 
                        ? 'bg-indigo-500 text-white shadow-md font-bold transform scale-105' 
                        : 'bg-white text-indigo-400 hover:bg-indigo-100'}`}
                  >
                    {tab}단계 
                    <span className="text-sm block font-normal">
                      ({(tab - 1) * 20 + 1} ~ {tab * 20})
                    </span>
                  </button>
                ))}
              </div>

              <div className="grid grid-cols-5 gap-3 flex-grow">
                {Array.from({ length: 20 }).map((_, i) => (
                  <div 
                    key={i} 
                    className={`aspect-square rounded-2xl flex items-center justify-center text-4xl lg:text-5xl transition-all duration-500
                      ${i < stickersInThisTab 
                        ? 'bg-yellow-50 border-4 border-yellow-400 shadow-md transform hover:rotate-12 hover:scale-110' 
                        : 'bg-gray-50 border-4 border-dashed border-gray-200 opacity-50'}`}
                  >
                    {i < stickersInThisTab ? '🎉' : ''}
                  </div>
                ))}
              </div>
            </div>

          </div>

          {showCelebration && (
            <div className="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
              <div className="bg-white rounded-[3rem] p-12 flex flex-col items-center shadow-2xl border-8 border-yellow-400 animate-bounce text-center max-w-2xl w-full">
                <span className="text-9xl mb-6">👑</span>
                <h2 className="text-5xl font-bold text-pink-500 mb-6 drop-shadow-md">파티 시간입니다!</h2>
                <p className="text-2xl text-gray-700 mb-10 leading-relaxed">
                  최고예요!<br/>우리 {selectedClass}반이<br/>폭죽 스티커 100개를 모두 모았어요!
                </p>
                <button 
                  onClick={() => setShowCelebration(false)}
                  className="px-12 py-4 bg-indigo-500 text-white rounded-full text-2xl font-bold hover:bg-indigo-600 hover:scale-105 transition-all shadow-lg"
                >
                  닫기
                </button>
              </div>
            </div>
          )}

        </div>
      );
    }

    // 최종적으로 화면에 그리기
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
